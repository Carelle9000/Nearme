workflows:
  nearme-release:
    name: NearMe Release Build
    instance_type: windows_instance
    max_build_duration: 60

    # ────────────────────────────────────────────────────────────
    # ENVIRONMENT VARIABLES
    # ────────────────────────────────────────────────────────────
    environment:
      android_signing:
        - nearme_keystore
      groups:
        - firebase_secrets
      vars:
        FLUTTER_VERSION: "3.3.0"

    # ────────────────────────────────────────────────────────────
    # TRIGGER (On commits to main or tags)
    # ────────────────────────────────────────────────────────────
    triggering:
      events:
        - push
      branch:
        - main
      tag:
        pattern: 'v[0-9]+\.[0-9]+\.[0-9]+'

    # ────────────────────────────────────────────────────────────
    # BUILD STEPS
    # ────────────────────────────────────────────────────────────
    scripts:
      - name: Setup Flutter
        script: |
          echo "Installing Flutter $FLUTTER_VERSION"
          flutter channel stable
          flutter upgrade
          flutter --version

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze code
        script: |
          flutter analyze

      - name: Build APK
        script: |
          flutter build apk --release

      - name: Install Firebase CLI
        script: |
          npm install -g firebase-tools

      - name: Authenticate Firebase
        script: |
          echo $FIREBASE_TOKEN > firebase-token.json
          firebase login:use-service-account firebase-token.json

      - name: Upload to Firebase App Distribution
        script: |
          firebase app-distribution:distribute \
            build/app/outputs/flutter-app.apk \
            --app=$FIREBASE_APP_ID \
            --release-notes="NearMe v$(git describe --tags --always)" \
            --testers=$FIREBASE_TESTERS

    # ────────────────────────────────────────────────────────────
    # ARTIFACTS (Save files after build)
    # ────────────────────────────────────────────────────────────
    artifacts:
      - build/app/outputs/flutter-app.apk
      - build/app/outputs/bundle/release/app-release.aab

    # ────────────────────────────────────────────────────────────
    # NOTIFICATIONS
    # ────────────────────────────────────────────────────────────
    publishing:
      email:
        recipients:
          - $CODEMAGIC_EMAIL
        notify:
          success: true
          failure: true
