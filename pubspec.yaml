name: nearme
description: "NearMe — Hyperlocal Dating App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / State
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  cloud_functions: ^5.6.2
  firebase_messaging: ^15.0.0

  # Connectivity
  connectivity_plus: ^6.1.0
  geolocator: ^12.0.0
  geoflutterfire_plus: ^0.0.32

  # Persistence légère (langue, pays)
  shared_preferences: ^2.3.2

  # Photos
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # UUID local
  uuid: ^4.4.0

  # Background video on landing screen
  video_player: ^2.9.2

  # Social sign-in (requis par firebase_auth)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4

  # HTTP client for API calls
  http: ^1.1.0
  timeago: ^3.7.0

  # Stripe Identity verification
  flutter_stripe: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/logo.jpeg
    - assets/images/
