name: nearme
description: "NearMe — Hyperlocal Dating App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / State
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^8.1.0
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_database: ^12.4.4
  firebase_storage: ^13.4.3
  cloud_functions: ^6.3.3
  firebase_messaging: ^16.4.1

  # Connectivity
  connectivity_plus: ^7.2.0
  geolocator: ^14.0.3
  geoflutterfire_plus: ^0.0.32

  # Persistence légère (langue, pays)
  shared_preferences: ^2.3.2

  # Photos & Image Processing
  image_picker: ^1.1.2
  camera: ^0.12.0+1
  image: ^4.0.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Permissions
  permission_handler: ^12.0.3

  # UUID local
  uuid: ^4.4.0

  # Background video on landing screen
  video_player: ^2.9.2

  # Social sign-in (requis par firebase_auth)
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

  # HTTP client for API calls
  http: ^1.1.0
  timeago: ^3.7.0

  # Stripe Identity verification
  flutter_stripe: ^13.0.0

  # Image caching & optimization
  cached_network_image: ^3.3.1
  image_cropper: ^12.2.1

  # Sharing
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/logo.jpeg
    - assets/images/
