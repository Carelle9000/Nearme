version: '3.9'

services:

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nearme
      POSTGRES_USER:     nearme
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nearme"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://nearme:${DB_PASS:-changeme}@db:5432/nearme
      JWT_SECRET:           ${JWT_SECRET:-changeme_jwt_secret_32chars}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32chars}
      FACE_PLUS_PLUS_KEY:   ${FACE_PLUS_PLUS_KEY:-}
      FACE_PLUS_PLUS_SECRET: ${FACE_PLUS_PLUS_SECRET:-}
      PORT:                 8080
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  uploads_data:
